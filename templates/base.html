<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Revyo{% endblock %}</title>
  <meta name="description" content="{% block meta_desc %}Sistema de reservas online para tu negocio.{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-container" id="flash-container">
    {% for category, message in messages %}
    <div class="flash flash--{{ category }}">
      <span>{{ message }}</span>
      <button onclick="this.parentElement.remove()" class="flash__close">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_scripts %}{% endblock %}
<script>
  setTimeout(() => {
    document.querySelectorAll('.flash').forEach(el => {
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    });
  }, 4000);
</script>
</body>
</html>
